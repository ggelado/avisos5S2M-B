name: Build y Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: 0 19 * * 1-5
      timezone: 'Europe/Madrid'
    - cron: 0 12 * * 1-5
      timezone: 'Europe/Madrid'
    - cron: 0 15 * * 1-5
      timezone: 'Europe/Madrid'
    - cron: 0 14 * * 1-5
      timezone: 'Europe/Madrid'
    - cron: 0 17 * * 1-5
      timezone: 'Europe/Madrid'
      # The change of day is handled through triqui
  

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install PyYAML

      - name: Validar posts
        run: python scripts/validate_posts.py

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Ejecutar script de caducidad
        run: python caducidad.py

      - name: Generar calendario ICS
        run: python calfile.py

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Build con Jekyll
        uses: actions/jekyll-build-pages@v1

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
