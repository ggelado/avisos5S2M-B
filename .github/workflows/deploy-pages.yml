name: Build y Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Ejecutar script de caducidad
        run: python caducidad.py

      - name: Generar calendario ICS
        run: python calfile.py

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Build con Jekyll
        uses: actions/jekyll-build-pages@v1

      - name: Fix sitemap namespace
        run: |
          if [ -f ./_site/sitemap.xml ]; then
            sudo sed -i 's/ xmlns:xsi="[^"]*" xsi:schemaLocation="[^"]*"//g' ./_site/sitemap.xml
          fi

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
